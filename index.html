<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

.container{
width:90%;
max-width:380px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
border-radius:20px;
padding:35px 20px;
text-align:center;
color:white;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h1{
color:#ffd400;
margin-bottom:10px;
font-size:28px;
}

.desc{
color:#ddd;
font-size:16px;
margin-bottom:25px;
}

.timer{
font-size:60px;
color:#00f5b5;
font-weight:bold;
}

.timer-text{
margin-bottom:30px;
color:#ccc;
}

.join-btn{
display:inline-block;
padding:18px 35px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
font-size:18px;
color:white;
background:linear-gradient(90deg,#1e90ff,#00d4aa);
animation:zoomGlow 1.5s infinite;
}

@keyframes zoomGlow{

0%{
transform:scale(1);
box-shadow:0 0 10px #00d4aa;
}

50%{
transform:scale(1.1);
box-shadow:0 0 35px #00d4aa;
}

100%{
transform:scale(1);
box-shadow:0 0 10px #00d4aa;
}

}

<div class="timer-text">Seconds Left</div>

<a class="join-btn" href="https://t.me/+hwdBZHcNc-JjOGZl">
JOIN THE CHANNEL NOW
</a>

<div class="footer">
Sharing expertise as a dedicated cricket analyst
</div>

</div>

<script>

let time = 15;
let countdown = document.getElementById("countdown");

let timer = setInterval(function(){

time--;
countdown.innerHTML = time;

if(time <= 0){
clearInterval(timer);
countdown.innerHTML = "0";
}

},1000);

</script>
